version: '3.8'

services:
  backend:
    build: .
    container_name: starpoint-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the data directory as writable so the generator can update files
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped