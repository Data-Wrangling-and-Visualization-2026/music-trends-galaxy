# SQLite is stored in ./music-trends-galaxy/backend/data (backend volume).
# A separate database service is not needed: the data is created by the entrypoint (generate_fake_data.py).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      # CSV for seed at startup (populates galaxy_tracks in SQLite)
      - ./storage:/app/storage:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
